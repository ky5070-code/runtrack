<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#060606" />
    <meta name="description" content="AI 기반 러닝 커뮤니티 - RUNCREW" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RUNCREW" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>RUNCREW</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; width: 100%; }
      body {
        background: #060606;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      #root {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        left: env(safe-area-inset-left, 0px);
        right: env(safe-area-inset-right, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* ── 다크 모드 (기본) ── */
      :root, [data-theme="dark"] {
        --bg:        #060606;
        --bg2:       #0a0a0a;
        --bg3:       #0d0d0d;
        --bg4:       #111111;
        --bg5:       #141414;
        --border:    #1a1a1a;
        --border2:   #222222;
        --border3:   #2a2a2a;
        --text1:     #e0e0e0;
        --text2:     #aaaaaa;
        --text3:     #666666;
        --text4:     #444444;
        --text5:     #333333;
        --card:      #0b0b0b;
        --card-me:   #0a0f0a;
        --input-bg:  #0a0a0a;
        --modal-bg:  #0d0d0d;
        --overlay:   rgba(0,0,0,0.85);
        --accent:    #00ff88;
        --accent2:   #00cc66;
        --accent-grad: #00ff88;
        --accent-bg: #0d1f14;
        --accent-bd: #1a3028;
      }

      /* ── 라이트 모드 ── */
      [data-theme="light"] {
        --bg:        #f5f5f5;
        --bg2:       #eeeeee;
        --bg3:       #ffffff;
        --bg4:       #e8e8e8;
        --bg5:       #e0e0e0;
        --border:    #e0e0e0;
        --border2:   #cccccc;
        --border3:   #bbbbbb;
        --text1:     #111111;
        --text2:     #444444;
        --text3:     #777777;
        --text4:     #999999;
        --text5:     #bbbbbb;
        --card:      #ffffff;
        --card-me:   #f0fdf6;
        --input-bg:  #f8f8f8;
        --modal-bg:  #ffffff;
        --overlay:   rgba(0,0,0,0.55);
        --accent:    #DB2777;
        --accent2:   #9333EA;
        --accent-grad: linear-gradient(135deg, #DB2777, #9333EA);
        --accent-bg: #fdf2f8;
        --accent-bd: #f0abfc;
      }

      /* 테마 전환 트랜지션 */
      body { transition: background-color 0.25s ease; }

      /* 공통 유틸 */
      [data-theme="light"] .chat-bubble-other {
        background: #f0f0f0 !important;
        color: #111 !important;
      }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
      body { -webkit-user-select: none; user-select: none; }
      input, textarea { -webkit-user-select: text; user-select: text; }
      button { cursor: pointer; }
      button:active { opacity: 0.75; transition: opacity 0.08s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
